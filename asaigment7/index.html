<h2>To-Do List</h2>
<input type="text" id="task" placeholder="Masukkan tugas">
<button onclick="tambahTugas()">Tambah</button>
<input type="text" id="search" placeholder="Cari tugas..." onkeyup="filterTugas()">
<ul id="daftar-tugas"></ul>
<script>
    function tambahTugas() {
        const input = document.getElementById("task");
        const ul = document.getElementById("daftar-tugas");
        const li = document.createElement("li");
        li.textContent = input.value;
        li.onclick = function () {
            const teksLama = li.textContent;
            const inputEdit = document.createElement("input");
            inputEdit.type = "text";
            inputEdit.value = teksLama;

            li.textContent = "";
            li.appendChild(inputEdit);
            inputEdit.focus();

            inputEdit.onblur = function () {
                li.textContent = inputEdit.value;
            };

            inputEdit.onkeypress = function (e) {
                if (e.key === "Enter") {
                    li.textContent = inputEdit.value;
                }
            };
        };
        li.remove();
    };
    ul.appendChild(li);
    input.value = "";
}
</script>
<input type="text" id="belanja" placeholder="Tambah item">
<button onclick="tambahItem()">Tambah</button>
<ul id="list-belanja"></ul>
<script>
    function tambahItem() {
        const input =
            document.getElementById("belanja");
        const ul = document.getElementById("list-belanja");
        const li = document.createElement("li");
        li.textContent = input.value;
        li.onclick = function () {
            li.classList.toggle("selesai");
        };
        ul.appendChild(li);
        input.value = "";
    }
</script>

<style>
    .selesai {
        text-decoration: line-through;
        color: gray;
    }
</style>
